name: weather_app
description: A professional climate forecasting app with Firebase, GPS, Voice Assistant & Notifications.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.25.0
  firebase_auth: ^4.17.0
  firebase_database: ^10.4.0

  # Weather API (HTTP)
  http: ^1.2.0

  # Lottie Animations
  lottie: ^3.1.2

  # GPS
  geolocator: ^10.0.1

  # Speech Recognition
  speech_to_text: ^6.6.0

  # Text-to-Speech
  flutter_tts: ^4.0.2

  # Local Notifications
  awesome_notifications: ^0.8.2

  # State management (optional but useful)
  provider: ^6.1.2

  # Smooth animations
  animated_text_kit: ^4.2.2

  # Google Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:

  uses-material-design: true

  assets:
    - assets/icons/sun.png
    - assets/icons/rain.png
    - assets/icons/cloudy.png
    - assets/icons/voice.png
    - assets/icons/wind.png

    - assets/animations/sunny.json
    - assets/animations/rain.json
    - assets/animations/cloudy.json

    - assets/images/bg.jpg
